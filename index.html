<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTT 看板瀏覽器</title>
    <style>
        body { max-width: 800px; margin: 0 auto; padding: 20px; font-family: 'Arial', sans-serif; }
        .post-item { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .push { color: green; }
        .boo { color: red; }
    </style>
</head>
<body>
    <h1 id="board-title">載入中...</h1>
    <div id="post-list"></div>

    <script>
        // 假設你的檔案存成 ptt_data.json
        fetch('ptt_data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('board-title').innerText = `看板：${data.board_name}`;
                const container = document.getElementById('post-list');
                
                data.articles.forEach(post => {
                    const div = document.createElement('div');
                    div.className = 'post-item';
                    div.innerHTML = `
                        <h3><a href="${post.url}" target="_blank">${post.title}</a></h3>
                        <p>時間：${post.publish_time} | 
                           <span class="push">推: ${post.push_count}</span> / 
                           <span class="boo">噓: ${post.boo_count}</span>
                        </p>
                    `;
                    container.appendChild(div);
                });
            });
    </script>
</body>
</html>
