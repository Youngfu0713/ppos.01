<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股14天歷史價抓取工具 (GitHub 終極穩定版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            background-color: #f5f5f7;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #1d1d1f;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 12px 24px;
            background-color: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0077ed;
        }
        .market-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #e3f2fd;
            color: #0d47a1;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        th {
            background-color: #f5f5f7;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>台股歷程價格查詢</h2>
    <div class="search-box">
        <input type="text" id="stockCode" placeholder="輸入上市/上櫃代號 (如: 2330, 8383)" value="2330">
        <button onclick="startFetch()">抓取資料</button>
    </div>
    
    <div id="loadingStatus" class="loading">正在向 GitHub 開源高流量數據庫請求數據...</div>
    <div id="marketInfo"></div>
    
    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>日期</th>
                <th>開盤價</th>
                <th>最高價</th>
                <th>最低價</th>
                <th>收盤價</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
async function startFetch() {
    const stockCode = document.getElementById('stockCode').value.trim();
    if (!stockCode) {
        alert('請輸入股票代號！');
        return;
    }

    const table = document.getElementById('resultTable');
    const tbody = document.getElementById('tableBody');
    const loading = document.getElementById('loadingStatus');
    const marketInfo = document.getElementById('marketInfo');
    
    tbody.innerHTML = '';
    marketInfo.innerHTML = '';
    table.style.display = 'none';
    loading.style.display = 'block';

    // 串接熱門開源台股數據庫 (r93052/TaiwanStockPrice) 的主分支 JSON 資料
    const apiUrl = `https://cdn.jsdelivr.net/gh/r93052/TaiwanStockPrice@main/data/${stockCode}.json`;

    try {
        const response = await fetch(apiUrl);
        
        if (!response.ok) {
            throw new Error('找不到該個股歷史檔案，請確認代號是否正確。');
        }
        
        const resData = await response.json();
        
        // 該資料庫格式通常為物件，核心陣列在庫中的 key 可能因版本不同，這裡做防禦性檢查
        // 如果抓下來直接是陣列，就用陣列；若是物件，試著尋找裡面的歷史欄位
        const stockHistory = Array.isArray(resData) ? resData : (resData.price_array || resData.data || []);

        if (stockHistory.length === 0) {
            alert('此股票檔案內無有效價格紀錄。');
            loading.style.display = 'none';
            return;
        }

        // 資料庫預設是舊到新，我們將其反轉，並擷取最新的 14 筆交易日
        const recent14Days = stockHistory.reverse().slice(0, 14);

        marketInfo.innerHTML = `<span class="market-badge">數據來源：熱門開源台股日線清單</span>`;
        
        recent14Days.forEach(item => {
            // 讀取對應的欄位數據（通常支援大小寫或標準 open/high/low/close 物件）
            const date = item.date || item.Date || '--';
            const open = item.open || item.Open || '--';
            const high = item.high || item.High || '--';
            const low = item.low || item.Low || '--';
            const close = item.close || item.Close || '--';

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${date}</td>
                <td style="color:#333;">${open}</td>
                <td style="color:#d9383a;">${high}</td>
                <td style="color:#2da44e;">${low}</td>
                <td style="font-weight:bold;">${close}</td>
            `;
            tbody.appendChild(tr);
        });

        loading.style.display = 'none';
        table.style.display = 'table';

    } catch (error) {
        console.error(error);
        alert('抓取失敗：' + error.message);
        loading.style.display = 'none';
    }
}
</script>

</body>
</html>
