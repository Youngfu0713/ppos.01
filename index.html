<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股14天歷史價抓取工具 (黃金終極版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            background-color: #f5f5f7;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #1d1d1f;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 12px 24px;
            background-color: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0077ed;
        }
        .market-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #e3f2fd;
            color: #0d47a1;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        th {
            background-color: #f5f5f7;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>台股歷程價格查詢</h2>
    <div class="search-box">
        <input type="text" id="stockCode" placeholder="輸入上市/上櫃代號 (如: 2330, 8383)" value="2330">
        <button onclick="startFetch()">抓取資料</button>
    </div>
    
    <div id="loadingStatus" class="loading">正在安全連線至官方金融數據中心...</div>
    <div id="marketInfo"></div>
    
    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>日期</th>
                <th>開盤價</th>
                <th>最高價</th>
                <th>最低價</th>
                <th>收盤價</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
async function startFetch() {
    const stockCode = document.getElementById('stockCode').value.trim();
    if (!stockCode) {
        alert('請輸入股票代號！');
        return;
    }

    const table = document.getElementById('resultTable');
    const tbody = document.getElementById('tableBody');
    const loading = document.getElementById('loadingStatus');
    const marketInfo = document.getElementById('marketInfo');
    
    tbody.innerHTML = '';
    marketInfo.innerHTML = '';
    table.style.display = 'none';
    loading.style.display = 'block';

    // 計算 30 天前的時間戳記，確保有足夠的交易日
    const period2 = Math.floor(Date.now() / 1000);
    const period1 = period2 - (30 * 24 * 60 * 60);

    let csvText = "";
    let marketType = "上市股票";

    try {
        // 1. 先嘗試抓上市 (.TW) 的官方不鎖跨域 CSV
        const twseUrl = `https://query1.finance.yahoo.com/v3/finance/download/${stockCode}.TW?period1=${period1}&period2=${period2}&interval=1d&events=history&includeAdjustedClose=true`;
        
        let response = await fetch(twseUrl);
        
        // 2. 如果上市找不到，自動改抓上櫃 (.TWO) 的 CSV
        if (!response.ok) {
            marketType = "上櫃股票";
            const tpexUrl = `https://query1.finance.yahoo.com/v3/finance/download/${stockCode}.TWO?period1=${period1}&period2=${period2}&interval=1d&events=history&includeAdjustedClose=true`;
            response = await fetch(tpexUrl);
        }

        if (!response.ok) {
            throw new Error('上市與上櫃皆查無此代號，請檢查輸入是否正確。');
        }

        csvText = await response.text();
        
        // 3. 開始解析 CSV 文字
        const lines = csvText.split('\n');
        let formattedData = [];

        // 第一行是標題 (Date,Open,High,Low,Close...)，所以從 i=1 開始跑
        for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',');
            if (cols.length < 6 || cols[1] === 'null' || cols[4] === 'null') continue; // 跳過空值或無效行

            formattedData.push({
                date: cols[0],                            // 日期
                open: parseFloat(cols[1]).toFixed(2),     // 開盤
                high: parseFloat(cols[2]).toFixed(2),     // 最高
                low: parseFloat(cols[3]).toFixed(2),      // 最低
                close: parseFloat(cols[4]).toFixed(2)     // 收盤
            });
        }

        if (formattedData.length === 0) {
            alert('查無近期有效的交易價格。');
            loading.style.display = 'none';
            return;
        }

        // 反轉陣列（讓最新日期排最上面），並精準切出 14 筆交易日
        const recent14Days = formattedData.reverse().slice(0, 14);

        marketInfo.innerHTML = `<span class="market-badge">${marketType} - 官方數據同步成功</span>`;

        recent14Days.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.date}</td>
                <td style="color:#333;">${item.open}</td>
                <td style="color:#d9383a;">${item.high}</td>
                <td style="color:#2da44e;">${item.low}</td>
                <td style="font-weight:bold;">${item.close}</td>
            `;
            tbody.appendChild(tr);
        });

        loading.style.display = 'none';
        table.style.display = 'table';

    } catch (error) {
        console.error(error);
        alert('抓取錯誤：' + error.message);
        loading.style.display = 'none';
    }
}
</script>

</body>
</html>
