<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股14天歷史價抓取工具 (GitHub 完美版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            background-color: #f5f5f7;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #1d1d1f;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 12px 24px;
            background-color: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0077ed;
        }
        .market-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #e3f2fd;
            color: #0d47a1;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        th {
            background-color: #f5f5f7;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>台股歷程價格查詢</h2>
    <div class="search-box">
        <input type="text" id="stockCode" placeholder="輸入上市/上櫃代號 (如: 2330, 8383)" value="8383">
        <button onclick="startFetch()">抓取資料</button>
    </div>
    
    <div id="loadingStatus" class="loading">正在連線至開放金融資料庫...</div>
    <div id="marketInfo"></div>
    
    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>日期</th>
                <th>開盤價</th>
                <th>最高價</th>
                <th>最低價</th>
                <th>收盤價</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
async function startFetch() {
    const stockCode = document.getElementById('stockCode').value.trim();
    if (!stockCode) {
        alert('請輸入股票代號！');
        return;
    }

    const table = document.getElementById('resultTable');
    const tbody = document.getElementById('tableBody');
    const loading = document.getElementById('loadingStatus');
    const marketInfo = document.getElementById('marketInfo');
    
    tbody.innerHTML = '';
    marketInfo.innerHTML = '';
    table.style.display = 'none';
    loading.style.display = 'block';

    // 計算一個月前的日期，確保能拿到足夠 14 天的歷史資料
    const today = new Date();
    const pastDate = new Date(today.getFullYear(), today.getMonth() - 1, today.getDate());
    
    const formatDate = (d) => {
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    };

    const startDate = formatDate(pastDate);

    // 呼叫 FinMind 公開台股日成交資料 API (完全不鎖 CORS)
    const apiUrl = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${stockCode}&start_date=${startDate}`;

    try {
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error('網路請求失敗');
        
        const resData = await response.json();
        
        if (resData.status !== 200 || !resData.data || resData.data.length === 0) {
            alert('查無此股票歷史資料，請確認代號是否正確。');
            loading.style.display = 'none';
            return;
        }

        // FinMind 資料是正序（舊到新），我們將其反轉（新到舊），並截取最新的 14 筆
        const recent14Days = resData.data.reverse().slice(0, 14);

        marketInfo.innerHTML = `<span class="market-badge">個股歷史行情 - 已透過 FinMind 渲染</span>`;
        
        recent14Days.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.date}</td>
                <td style="color:#333;">${item.open}</td>
                <td style="color:#d9383a;">${item.max}</td>
                <td style="color:#2da44e;">${item.min}</td>
                <td style="font-weight:bold;">${item.close}</td>
            `;
            tbody.appendChild(tr);
        });

        loading.style.display = 'none';
        table.style.display = 'table';

    } catch (error) {
        console.error(error);
        alert('抓取失敗：' + error.message);
        loading.style.display = 'none';
    }
}
</script>

</body>
</html>
