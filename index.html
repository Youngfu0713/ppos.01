<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股14天歷史價抓取工具 (終極完美版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            background-color: #f5f5f7;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #1d1d1f;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 12px 24px;
            background-color: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0077ed;
        }
        .market-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #e3f2fd;
            color: #0d47a1;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        th {
            background-color: #f5f5f7;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>台股歷程價格查詢</h2>
    <div class="search-box">
        <input type="text" id="stockCode" placeholder="輸入上市/上櫃代號 (如: 2330, 8383)" value="2330">
        <button onclick="startFetch()">抓取資料</button>
    </div>
    
    <div id="loadingStatus" class="loading">正在連線至國際金融數據庫庫...</div>
    <div id="marketInfo"></div>
    
    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>日期</th>
                <th>開盤價</th>
                <th>最高價</th>
                <th>最低價</th>
                <th>收盤價</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
function startFetch() {
    const stockCode = document.getElementById('stockCode').value.trim();
    if (!stockCode) {
        alert('請輸入股票代號！');
        return;
    }

    const table = document.getElementById('resultTable');
    const tbody = document.getElementById('tableBody');
    const loading = document.getElementById('loadingStatus');
    const marketInfo = document.getElementById('marketInfo');
    
    tbody.innerHTML = '';
    marketInfo.innerHTML = '';
    table.style.display = 'none';
    loading.style.display = 'block';

    // 移除舊的 JSONP Script 標籤
    const oldScript = document.getElementById('yahooJsonp');
    if (oldScript) oldScript.remove();

    // 1. 自動判定上市還上櫃：台灣上市代號為 .TW，上櫃代號為 .TWO (例如：2330.TW / 8383.TWO)
    // 這裡我們利用動態建立 <script> (JSONP) 串接穩定的免鎖跨域接口
    // 計算時間戳記（抓取最近 30 天，確保能濾出 14 個交易日）
    const period2 = Math.floor(Date.now() / 1000);
    const period1 = period2 - (30 * 24 * 60 * 60);

    // 預設先用上市格式 .TW 去嘗試
    let symbol = `${stockCode}.TW`;
    
    // 為了徹底防禦跨域，我們使用一個永久免跨域的通用 JSONP 轉發公共代理節點
    // 這裡直接請求 Yahoo 財經公開歷史 Chart API
    const yahooApi = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=${period1}&period2=${period2}&interval=1d&events=history`;
    
    // 使用萬能的 jsonp 封裝轉發服務（如 bscv 或是同樣性質的開源過濾節點）
    // 這裡我們直接利用萬能的公共代理將其轉為 script 執行
    const finalUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(yahooApi)}&callback=handleYahooResponse`;

    const script = document.createElement('script');
    script.id = 'yahooJsonp';
    script.src = finalUrl;
    script.onerror = function() {
        alert('連線失敗，請稍後再試。');
        loading.style.display = 'none';
    };
    document.body.appendChild(script);
}

// 處理並解析 Yahoo 傳回來的資料
async function handleYahooResponse(response) {
    const loading = document.getElementById('loadingStatus');
    const tbody = document.getElementById('tableBody');
    const table = document.getElementById('resultTable');
    const marketInfo = document.getElementById('marketInfo');
    const stockCode = document.getElementById('stockCode').value.trim();

    try {
        // allorigins 會把原始資料包在 response.contents 裡面
        const json = JSON.parse(response.contents);
        const chart = json.chart;

        // 如果上市（.TW）沒抓到資料，自動切換到上櫃（.TWO）再試一次
        if (!chart || !chart.result || chart.result[0].indicators.quote[0].close === null) {
            const oldScript = document.getElementById('yahooJsonp');
            if (oldScript && !oldScript.dataset.retry) {
                oldScript.remove();
                
                // 改試上櫃後端
                const period2 = Math.floor(Date.now() / 1000);
                const period1 = period2 - (30 * 24 * 60 * 60);
                let symbol = `${stockCode}.TWO`;
                const yahooApi = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=${period1}&period2=${period2}&interval=1d&events=history`;
                const finalUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(yahooApi)}&callback=handleYahooResponse`;

                const script = document.createElement('script');
                script.id = 'yahooJsonp';
                script.dataset.retry = "true"; // 標記已經重試過
                script.src = finalUrl;
                document.body.appendChild(script);
                return;
            } else {
                alert('查無此股票代號（上市 .TW 與 上櫃 .TWO 皆查無資料）。');
                loading.style.display = 'none';
                return;
            }
        }

        const result = chart.result[0];
        const timestamps = result.timestamp;
        const quote = result.indicators.quote[0];

        if (!timestamps || timestamps.length === 0) {
            alert('此股票近期無交易紀錄。');
            loading.style.display = 'none';
            return;
        }

        // 整理 Yahoo 散落的陣列欄位
        let formattedData = [];
        for (let i = 0; i < timestamps.length; i++) {
            if (quote.close[i] === null) continue; // 跳過無效交易日
            
            // 轉換 Unix 時間戳記為 YYYY-MM-DD
            const dateObj = new Date(timestamps[i] * 1000);
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            
            formattedData.push({
                date: `${y}-${m}-${d}`,
                open: quote.open[i].toFixed(2),
                high: quote.high[i].toFixed(2),
                low: quote.low[i].toFixed(2),
                close: quote.close[i].toFixed(2)
            });
        }

        // 倒序排列（最新日期在最上面），並精準切出 14 天
        const recent14Days = formattedData.reverse().slice(0, 14);
        const marketType = document.getElementById('yahooJsonp').dataset.retry ? "上櫃股票" : "上市股票";

        marketInfo.innerHTML = `<span class="market-badge">${marketType} - 雅虎財經即時串流</span>`;

        recent14Days.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.date}</td>
                <td style="color:#333;">${item.open}</td>
                <td style="color:#d9383a;">${item.high}</td>
                <td style="color:#2da44e;">${item.low}</td>
                <td style="font-weight:bold;">${item.close}</td>
            `;
            tbody.appendChild(tr);
        });

        loading.style.display = 'none';
        table.style.display = 'table';

    } catch (e) {
        console.error(e);
        alert('解析數據失敗：' + e.message);
        loading.style.display = 'none';
    }
}
</script>

</body>
</html>
