<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股600天歷史價與CCI計算工具</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            background-color: #f5f5f7;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #1d1d1f;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 12px 24px;
            background-color: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0077ed;
        }
        .table-container {
            max-height: 500px;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        th {
            background-color: #f5f5f7;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .loading {
            text-align: center;
            color: #666;
            display: none;
            line-height: 1.6;
        }
        .cci-high { color: #d9383a; font-weight: bold; } /* > 100 超買 */
        .cci-low { color: #2da44e; font-weight: bold; }  /* < -100 超賣 */
    </style>
</head>
<body>

<div class="container">
    <h2>台股歷程價格與 CCI 查詢 (600天)</h2>
    <div class="search-box">
        <input type="text" id="stockCode" placeholder="請輸入股票代號 (如: 2330)" value="2330">
        <button onclick="startFetch()">抓取並計算</button>
    </div>
    
    <div id="loadingStatus" class="loading">正在初始化...</div>
    
    <div class="table-container" id="tableWrapper" style="display:none;">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>開盤價</th>
                    <th>最高價</th>
                    <th>最低價</th>
                    <th>收盤價</th>
                    <th>CCI (20)</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- 資料動態插入 -->
            </tbody>
        </table>
    </div>
</div>

<script>
// 延遲函式，避免頻繁請求被證交所封鎖 IP
const delay = ms => new Promise(res => setTimeout(res, ms));

async function startFetch() {
    const stockCode = document.getElementById('stockCode').value.trim();
    if (!stockCode) {
        alert('請輸入股票代號！');
        return;
    }

    const tableWrapper = document.getElementById('tableWrapper');
    const tbody = document.getElementById('tableBody');
    const loading = document.getElementById('loadingStatus');
    
    tbody.innerHTML = '';
    tableWrapper.style.display = 'none';
    loading.style.display = 'block';

    let allRawData = [];
    let currentDate = new Date();
    
    // 為了精準計算 600 天的 CCI，我們需要多抓大約 1 個月的緩衝資料（因為前 20 天無法計算 CCI）
    const targetCount = 630; 

    // 使用 CORS 代理（若在本地測試常被擋，可手動切換或提醒使用者）
    const corsProxy = "https://cors-anywhere.herokuapp.com/"; 
    // 注意：若無代理，直接使用網址。這裡預設直連，如遇阻擋可改用代理。
    
    try {
        while (allRawData.length < targetCount) {
            const year = currentDate.getFullYear();
            const month = String(currentDate.getMonth() + 1).padStart(2, '0');
            const dateStr = `${year}${month}01`;

            loading.innerText = `正在下載 ${year}/${month} 的歷史資料...\n目前已收集 ${allRawData.length} 筆資料`;

            const apiUrl = `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${dateStr}&stockNo=${stockCode}`;
            
            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error(`月份 ${year}/${month} 請求失敗`);
            
            const resData = await response.json();
            
            if (resData.stat === "OK" && resData.data) {
                // 將該月資料併入（因證交所給的是正序，我們保留正序方便後面由舊到新計算指標）
                allRawData = [...resData.data, ...allRawData];
            }

            // 往月份推前一個月
            currentDate.setMonth(currentDate.getMonth() - 1);

            // 安全緩衝時間：每次請求休息 1.5 秒，避免 429 錯誤
            await delay(1500); 
            
            // 防呆機制：若往前推了 40 個月還抓不滿（可能股票剛上市），就跳出
            if (currentDate.getFullYear() < 2010) break;
        }

        if (allRawData.length === 0) {
            alert('查無資料，請確認代號是否正確（僅支援上市股票）。');
            loading.style.display = 'none';
            return;
        }

        // 資料處理與 CCI 計算
        // 1. 先清洗並轉換資料型態 (由舊到新排列，利於指標滾動計算)
        // 證交所原本是由舊到新，我們在 loop 中是把新月份往舊月份前面塞，所以現在撈出來的陣列順序需要梳理成「舊 -> 新」
        let kData = allRawData.map(row => ({
            date: row[0],
            open: parseFloat(row[3].replace(/,/g, '')),
            high: parseFloat(row[4].replace(/,/g, '')),
            low: parseFloat(row[5].replace(/,/g, '')),
            close: parseFloat(row[6].replace(/,/g, ''))
        })).filter(item => !isNaN(item.close));

        // 確保是由舊到新排列（歷史越久在越前面）
        // 排序逻辑：將民國年轉換為西元年再比較
        kData.sort((a, b) => {
            const parseDate = s => {
                const parts = s.split('/');
                return new Date(parseInt(parts[0]) + 1911, parts[1] - 1, parts[2]);
            };
            return parseDate(a.date) - parseDate(b.date);
        });

        // 2. 計算 CCI (週期常規採用 20)
        const period = 20;
        let cciValues = new Array(kData.length).fill(null);

        // 計算每一天的典型價格 TP = (High + Low + Close) / 3
        const tpValues = kData.map(d => (d.high + d.low + d.close) / 3);

        for (let i = period - 1; i < kData.length; i++) {
            // 取出當前視窗內的 TP
            const sliceTP = tpValues.slice(i - period + 1, i + 1);
            
            // 計算 MA (TP 的移動平均)
            const ma = sliceTP.reduce((acc, val) => acc + val, 0) / period;
            
            // 計算 MD (平均絕對偏差)
            const md = sliceTP.reduce((acc, val) => acc + Math.abs(val - ma), 0) / period;
            
            // 計算 CCI
            if (md !== 0) {
                cciValues[i] = (tpValues[i] - ma) / (0.015 * md);
            } else {
                cciValues[i] = 0;
            }
        }

        // 3. 將資料渲染至前端（改回最新在前，以便使用者觀看，並只取前 600 筆）
        let displayData = [];
        for(let i = 0; i < kData.length; i++) {
            displayData.push({ ...kData[i], cci: cciValues[i] });
        }
        
        // 最新日期排最上面
        displayData.reverse(); 
        const finalData = displayData.slice(0, 600);

        finalData.forEach(row => {
            const tr = document.createElement('tr');
            
            let cciText = row.cci !== null ? row.cci.toFixed(2) : '--';
            let cciClass = '';
            if (row.cci >= 100) cciClass = 'cci-high';
            if (row.cci <= -100) cciClass = 'cci-low';

            tr.innerHTML = `
                <td>${row.date}</td>
                <td>${row.open}</td>
                <td style="color:#d9383a;">${row.high}</td>
                <td style="color:#2da44e;">${row.low}</td>
                <td style="font-weight:bold;">${row.close}</td>
                <td class="${cciClass}">${cciText}</td>
            `;
            tbody.appendChild(tr);
        });

        loading.style.display = 'none';
        tableWrapper.style.display = 'block';

    } catch (error) {
        console.error(error);
        alert('資料抓取或計算失敗：' + error.message + '\n提示：若遇到跨域阻擋(CORS)，建議在伺服器端或搭配 Proxy 執行。');
        loading.style.display = 'none';
    }
}
</script>

</body>
</html>
