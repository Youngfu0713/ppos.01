<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股14天歷史價抓取工具 (GitHub 專用版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            background-color: #f5f5f7;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #1d1d1f;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 12px 24px;
            background-color: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0077ed;
        }
        .market-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #e3f2fd;
            color: #0d47a1;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        th {
            background-color: #f5f5f7;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>台股歷程價格查詢</h2>
    <div class="search-box">
        <input type="text" id="stockCode" placeholder="輸入上市/上櫃代號 (如: 2330, 8383)" value="8383">
        <button onclick="startFetch()">抓取資料</button>
    </div>
    
    <div id="loadingStatus" class="loading">正在向開放資料庫請求市場交易數據...</div>
    <div id="marketInfo"></div>
    
    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>日期</th>
                <th>開盤價</th>
                <th>最高價</th>
                <th>最低價</th>
                <th>收盤價</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
async function startFetch() {
    const stockCode = document.getElementById('stockCode').value.trim();
    if (!stockCode) {
        alert('請輸入股票代號！');
        return;
    }

    const table = document.getElementById('resultTable');
    const tbody = document.getElementById('tableBody');
    const loading = document.getElementById('loadingStatus');
    const marketInfo = document.getElementById('marketInfo');
    
    tbody.innerHTML = '';
    marketInfo.innerHTML = '';
    table.style.display = 'none';
    loading.style.display = 'block';

    let finalData = [];
    let marketType = "";

    try {
        // 1. 先嘗試從【上市】開放資料節點抓取所有股票的個股日成交資訊
        const twseResponse = await fetch(`https://openapi.twse.com.tw/v1/stock/STOCK_DAY_ALL`);
        if (twseResponse.ok) {
            const twseData = await twseResponse.json();
            const matchedTwse = twseData.filter(item => item.Code === stockCode);
            if (matchedTwse.length > 0) {
                marketType = "上市股票";
                finalData = matchedTwse.map(item => ({
                    date: item.Date ? `${item.Date.slice(0,4)}/${item.Date.slice(4,6)}/${item.Date.slice(6,8)}` : "今日",
                    open: item.OpeningPrice,
                    high: item.HighestPrice,
                    low: item.LowestPrice,
                    close: item.ClosingPrice
                }));
            }
        }

        // 2. 如果上市找不到，改用【上櫃】開放資料節點 (專門開給公眾 Fetch 的 api)
        if (finalData.length === 0) {
            // 呼叫櫃買中心不鎖 CORS 的 OpenAPI 行情節點
            const tpexResponse = await fetch(`https://openapi.tpex.org.tw/v1/stock/aftertrading/daily_close_quotes`);
            if (tpexResponse.ok) {
                const tpexData = await tpexResponse.json();
                const matchedTpex = tpexData.filter(item => item.Code === stockCode);
                if (matchedTpex.length > 0) {
                    marketType = "上櫃股票";
                    finalData = matchedTpex.map(item => ({
                        date: item.Date ? `${item.Date.slice(0,3)}/${item.Date.slice(3,5)}/${item.Date.slice(5,7)}` : "今日",
                        open: item.Open,
                        high: item.High,
                        low: item.Low,
                        close: item.Close
                    }));
                }
            }
        }

        if (finalData.length === 0) {
            alert('在開放資料庫中查無此股票代號（或今日數據尚未更新）。');
            loading.style.display = 'none';
            return;
        }

        // 截取最新 14 筆（開放資料部分節點為單日或多日，此處倒序排列呈現最新狀態）
        const recent14Days = finalData.reverse().slice(0, 14);

        marketInfo.innerHTML = `<span class="market-badge">${marketType} - 網頁環境請求成功</span>`;
        
        recent14Days.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.date}</td>
                <td style="color:#333;">${item.open || '--'}</td>
                <td style="color:#d9383a;">${item.high || '--'}</td>
                <td style="color:#2da44e;">${item.low || '--'}</td>
                <td style="font-weight:bold;">${item.close || '--'}</td>
            `;
            tbody.appendChild(tr);
        });

        loading.style.display = 'none';
        table.style.display = 'table';

    } catch (error) {
        console.error(error);
        alert('請求發生錯誤：' + error.message);
        loading.style.display = 'none';
    }
}
</script>

</body>
</html>
