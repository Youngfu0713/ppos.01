<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股14天歷史價抓取工具 (開源數據庫版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            background-color: #f5f5f7;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #1d1d1f;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 12px 24px;
            background-color: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0077ed;
        }
        .market-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #e3f2fd;
            color: #0d47a1;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        th {
            background-color: #f5f5f7;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>台股歷程價格查詢</h2>
    <div class="search-box">
        <input type="text" id="stockCode" placeholder="輸入上市/上櫃代號 (如: 2330, 8383)" value="8383">
        <button onclick="startFetch()">抓取資料</button>
    </div>
    
    <div id="loadingStatus" class="loading">正在連線至 GitHub 開源日線數據庫...</div>
    <div id="marketInfo"></div>
    
    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>日期</th>
                <th>開盤價</th>
                <th>最高價</th>
                <th>最低價</th>
                <th>收盤價</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
async function startFetch() {
    const stockCode = document.getElementById('stockCode').value.trim();
    if (!stockCode) {
        alert('請輸入股票代號！');
        return;
    }

    const table = document.getElementById('resultTable');
    const tbody = document.getElementById('tableBody');
    const loading = document.getElementById('loadingStatus');
    const marketInfo = document.getElementById('marketInfo');
    
    tbody.innerHTML = '';
    marketInfo.innerHTML = '';
    table.style.display = 'none';
    loading.style.display = 'block';

    // 獲取當前年份，用來決定讀取開源專案中的哪一個年度 JSON 檔
    const currentYear = new Date().getFullYear();

    // 串接開源社群維護的台股每日歷史數據節點 (這個來源是封裝在 GitHub 上的靜態資源，完全免除 CORS 問題)
    // 格式為：https://raw.githubusercontent.com/jiandong-tw/taiwan-stock-data/main/data/daily/{year}/{stockCode}.json
    const apiUrl = `https://cdn.jsdelivr.net/gh/jiandong-tw/taiwan-stock-data@main/data/daily/${currentYear}/${stockCode}.json`;

    try {
        // 使用 jsDelivr CDN 讀取 GitHub 檔案，速度最快且完全不鎖跨域
        const response = await fetch(apiUrl);
        
        if (!response.ok) {
            throw new Error('找不到該個股歷史檔案，可能代號錯誤或今年度尚無交易紀錄。');
        }
        
        const stockHistory = await response.json();
        
        if (!stockHistory || stockHistory.length === 0) {
            alert('該股票今年度無資料。');
            loading.style.display = 'none';
            return;
        }

        // 開源資料格式通常是舊到新，我們將其反轉（最新在最上），並擷取最新的 14 筆交易日
        const recent14Days = stockHistory.reverse().slice(0, 14);

        marketInfo.innerHTML = `<span class="market-badge">數據來源：GitHub 開源台股日線庫</span>`;
        
        recent14Days.forEach(item => {
            // 開源資料庫的欄位名稱通常為：date(日期), open(開盤), high(最高), low(最低), close(收盤)
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.date}</td>
                <td style="color:#333;">${item.open}</td>
                <td style="color:#d9383a;">${item.high}</td>
                <td style="color:#2da44e;">${item.low}</td>
                <td style="font-weight:bold;">${item.close}</td>
            `;
            tbody.appendChild(tr);
        });

        loading.style.display = 'none';
        table.style.display = 'table';

    } catch (error) {
        console.error(error);
        alert('抓取失敗：' + error.message + '\n提示：請確認代號是否正確。若為剛開工年初，可能需等候數據庫同步更新。');
        loading.style.display = 'none';
    }
}
</script>

</body>
</html>
