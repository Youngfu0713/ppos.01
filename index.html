<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股14天歷史價抓取工具</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            background-color: #f5f5f7;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #1d1d1f;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 12px 24px;
            background-color: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0077ed;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        th {
            background-color: #f5f5f7;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>台股歷程價格查詢</h2>
    <div class="search-box">
        <input type="text" id="stockCode" placeholder="請輸入股票代號 (如: 2330)" value="2330">
        <button onclick="fetchStockData()">抓取資料</button>
    </div>
    
    <div id="loadingStatus" class="loading">正在向證交所請求資料，請稍候...</div>
    
    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>日期</th>
                <th>開盤價</th>
                <th>最高價</th>
                <th>最低價</th>
                <th>收盤價</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- 資料會動態插入到這裡 -->
        </tbody>
    </table>
</div>

<script>
async function fetchStockData() {
    const stockCode = document.getElementById('stockCode').value.trim();
    if (!stockCode) {
        alert('請輸入股票代號！');
        return;
    }

    const table = document.getElementById('resultTable');
    const tbody = document.getElementById('tableBody');
    const loading = document.getElementById('loadingStatus');
    
    tbody.innerHTML = '';
    table.style.display = 'none';
    loading.style.display = 'block';

    // 獲取當前年月 (證交所 API 需要傳入年月參數格式: YYYYMMDD)
    const today = new Date();
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const dateStr = `${year}${month}01`; 

    // 使用證交所個股日成交資訊 API (經由官方公開 JSON 節點)
    const apiUrl = `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${dateStr}&stockNo=${stockCode}`;

    try {
        // 使用 cors-anywhere 或直連（證交所 API 目前通常允許基本跨域讀取，若手機瀏覽器被 CORS 攔截，可考慮加上代理）
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error('網路請求失敗');
        
        const resData = await response.json();
        
        if (resData.stat !== "OK" || !resData.data) {
            alert('查無此股票該月份資料，請確認代號是否正確（目前僅支援上市股票）。');
            loading.style.display = 'none';
            return;
        }

        // 取得該月所有交易日資料，倒序排列（從最新的一天開始數），並只截取前 14 筆
        const historyData = resData.data.reverse().slice(0, 14);

        historyData.forEach(row => {
            // 證交所欄位順序：0日期, 1成交股數, 2成交金額, 3開盤價, 4最高價, 5最低價, 6收盤價...
            const date = row[0];
            const open = row[3];
            const high = row[4];
            const low = row[5];
            const close = row[6];

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${date}</td>
                <td style="color:#333;">${open}</td>
                <td style="color:#d9383a;">${high}</td>
                <td style="color:#2da44e;">${low}</td>
                <td style="font-weight:bold;">${close}</td>
            `;
            tbody.appendChild(tr);
        });

        loading.style.display = 'none';
        table.style.display = 'table';

    } catch (error) {
        console.error(error);
        alert('資料抓取失敗，請稍後再試。原因：' + error.message);
        loading.style.display = 'none';
    }
}
</script>

</body>
</html>
